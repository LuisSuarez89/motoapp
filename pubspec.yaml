name: motoapp
description: App Flutter para moteros en Colombia con contenido configurable por JSON.
publish_to: 'none'
version: 1.0.1+4

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  url_launcher: ^6.3.0
  flutter_blue_plus: ^1.32.12
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  google_mobile_ads: ^7.0.0
  webview_flutter: ^4.13.1
  flutter_inappwebview: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/data/sections/
    - assets/data/brands/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png" # La ruta a tu imagen